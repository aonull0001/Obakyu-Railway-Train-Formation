<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>尾羽急電鉄 車両詳細表（非公式） ホーム</title>

<style>

body{
font-family:"Zen Maru Gothic", sans-serif;
background:#f0f0f0;
margin:0;
padding:30px;
padding-top:120px;
text-align:center;
overflow-x:hidden;
}

/* ヘッダー */
.obq-header{
position:fixed;
top:0;
left:0;
right:0;   /* width:100% の代わり */
background:#ffffff;
border-bottom:3px solid #333;
padding:10px 20px;
z-index:9999;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
text-align:left;
}
.header-title{
font-size:26px;
font-weight:bold;
margin-bottom:8px;
}

.header-menu{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.header-menu a{
font-size:18px;
text-decoration:none;
color:#333;
font-weight:bold;
transition:0.2s;
}

.header-menu a:hover{
color:#0078ff;
transform:translateY(-2px);
}

/* サブタイトル */

.subtitle{
font-size:18px;
color:#555;
margin-bottom:30px;
}

/* パスカード */

.pass-container{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

.pass-card{
width:240px;
height:110px;
background:#fff;
border-radius:16px;
border:2px solid #333;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
transition:transform .25s,box-shadow .25s;
}

.pass-card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.pass-title{
font-size:20px;
font-weight:bold;
}

/* 車両一覧 */

.train-list{
width:95%;
max-width:700px;
margin:30px auto;
opacity:0;
max-height:0;
overflow:hidden;
transform:translateY(20px);
transition:opacity .4s,transform .4s,max-height .4s;
}

.train-list.show{
opacity:1;
max-height:5000px;
transform:translateY(0);
}

/* 車両カード */

.train-card{
width:100%;
background:#fff;
border-radius:10px;
border:2px solid #333;
cursor:pointer;
margin-bottom:18px;
padding:18px;
transition:transform .25s,box-shadow .25s;
}

.train-card:hover{
transform:translateY(-4px);
box-shadow:0 6px 16px rgba(0,0,0,0.2);
}

.train-title{
font-size:20px;
font-weight:bold;
text-align:center;
}

/* ローディング */

#loading-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(240,240,240,0.95);
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
font-weight:bold;
color:#333;
opacity:0;
pointer-events:none;
transition:opacity .4s;
}

</style>
</head>

<body>

<header class="obq-header">
<div class="header-title">
尾羽急電鉄　車両詳細表（非公式）
</div>

<nav class="header-menu">
<a href="index.html">Home</a>
<a href="admin.html">管理者詳細</a>
<a href="site.html">サイト詳細</a>
<a href="contact.html">お問い合わせ</a>
</nav>
</header>


<div class="subtitle">パス選択</div>

<div class="pass-container">

<div class="pass-card" onclick="toggleList('free')">
<div class="pass-title">無料車</div>
</div>

<div class="pass-card" onclick="toggleList('vip')">
<div class="pass-title">VIPパス</div>
</div>

<div class="pass-card" onclick="toggleList('commute')">
<div class="pass-title">通勤列車パス</div>
</div>

<div class="pass-card" onclick="toggleList('private')">
<div class="pass-title">私鉄列車パス</div>
</div>

<div class="pass-card" onclick="toggleList('remodel')">
<div class="pass-title">車体改造パス</div>
</div>

<div class="pass-card" onclick="toggleList('fourcars')">
<div class="pass-title">4両列車パス</div>
</div>

</div>


<!-- 無料車 -->

<div id="list-free" class="train-list">

<div class="train-card" onclick="loadPage('free/5000kei.html')">
<div class="train-title">5000系</div>
</div>

<div class="train-card" onclick="loadPage('free/2020kei.html')">
<div class="train-title">2020系</div>
</div>

<div class="train-card" onclick="loadPage('free/7070kei.html')">
<div class="train-title">7070系</div>
</div>

<div class="train-card" onclick="loadPage('free/2000A_B.html')">
<div class="train-title">2000A系B更新車</div>
</div>

<div class="train-card" onclick="loadPage('free/4000kei.html')">
<div class="train-title">4000系</div>
</div>

<div class="train-card" onclick="loadPage('free/OB610.html')">
<div class="train-title">OB610系</div>
</div>

<div class="train-card" onclick="loadPage('free/RB3000.html')">
<div class="train-title">RB3000系</div>
</div>

</div>


<!-- VIP -->

<div id="list-vip" class="train-list">

<div class="train-card" onclick="loadPage('vip/OB778_2500.html')">
<div class="train-title">OB778系2500番台</div>
</div>

<div class="train-card" onclick="loadPage('vip/778_1190.html')">
<div class="train-title">778系1190番台</div>
</div>

<div class="train-card" onclick="loadPage('vip/kiha778_1000.html')">
<div class="train-title">キハ778形1000番台</div>
</div>

</div>


<!-- 通勤 -->

<div id="list-commute" class="train-list">

<div class="train-card" onclick="loadPage('commute/001_0.html')">
<div class="train-title">001系0番台</div>
</div>

<div class="train-card" onclick="loadPage('commute/001_100.html')">

<div id="list-private" class="train-list">

<div id="list-remodel" class="train-list">

<div id="list-fourcars" class="train-list">

<div class="train-card" onclick="loadPage('fourcars/8600.html')">

<div class="train-title">6800系</div>
</div>

</div>


<div id="loading-screen">Now Loading…</div>

<script>

let currentOpen=null;

function toggleList(id){

const list=document.getElementById("list-"+id);

if(currentOpen===id){
list.classList.remove("show");
currentOpen=null;
return;
}

if(currentOpen!==null){
document.getElementById("list-"+currentOpen).classList.remove("show");
}

list.classList.add("show");
currentOpen=id;

}

function loadPage(url){

const loading=document.getElementById("loading-screen");

loading.style.opacity="1";
loading.style.pointerEvents="auto";

setTimeout(()=>{
window.location.href=url;
},800);

}

</script>

</body>
</html>
