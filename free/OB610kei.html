<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>OB610系 編成一覧</title>

<style>
body {
  font-family: Zen Maru Gothic;
  background: #f0f0f0;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 5px;
  font-size: 32px;
}

.subtitle {
  text-align: center;
  font-size: 18px;
  margin-bottom: 20px;
  color: #444;
}

.direction {
  font-size: 20px;
  text-align: center;
  margin-bottom: 25px;
}

.section-title {
  font-size: 22px;
  font-weight: bold;
  margin-top: 25px;
  margin-bottom: 10px;
  border-left: 6px solid #333;
  padding-left: 10px;
}

/* ▼ ボックス */
.spec-box {
  background: #fff;
  border: 2px solid #333;
  padding: 15px;
  width: 350px;
  margin: 0 auto 30px auto;
  border-radius: 6px;
}

.spec-box ul {
  list-style: none;
  padding-left: 5px;
}

.spec-box ul li::before {
  content: "> ";
  font-weight: bold;
  color: #333;
}

/* ▼ 編成図 */
.train {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 25px;
}

.car {
  width: 120px;
  height: 140px;
  border: 2px solid #333;
  border-radius: 6px;
  background: #ffffff;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
}

/* ▼ 色分け */
.red {
  background: #ffdddd;
}

.black {
  background: #e0e0e0;
}

.car-top {
  height: 25px;
  position: relative;
}

.car-body {
  text-align: center;
  font-size: 13px;
}

.car-type {
  font-size: 12px;
  margin-bottom: 2px;
}

.car-number {
  font-size: 16px;
  font-weight: bold;
}

/* ▼ 折りたたみ（5000系と同じ） */
.train-list-collapsible {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transform: translateY(-10px);
  transition:
    max-height 0.6s ease,
    opacity 0.4s ease,
    transform 0.4s ease;
}

.train-list-collapsible.open {
  max-height: 99999px;
  opacity: 1;
  transform: translateY(0);
}

.show-all-btn {
  display: block;
  width: 200px;
  margin: 20px auto;
  padding: 10px 0;
  text-align: center;
  background: #fff;
  border: 2px solid #333;
  border-radius: 6px;
  cursor: pointer;
  font-size: 18px;
  transition: background 0.2s;
}

.show-all-btn:hover {
  background: #f5f5f5;
}
</style>

</head>

<body>

<h1>OB610系</h1>
<div class="subtitle">ー 無料車 ー</div>

<div class="direction">←尾羽原　　高徳→</div>

<!-- 基本情報 -->
<div class="section-title">基本情報</div>
<div class="spec-box">
  <ul>
    <li><b>運用者</b><br>尾羽急電鉄</li>
    <li><b>製造所</b><br>都上蒲高速鉄道（譲渡？）</li>
    <li><b>製造年</b><br>不明</li>
    <li><b>運用開始</b><br>2024年12月07日</li>
  </ul>
</div>

<!-- 共通仕様 -->
<div class="section-title">共通仕様</div>
<div class="spec-box">
  <ul>
    <li>乗客固定：×</li>
    <li>自動放送：×</li>
    <li>車掌乗務：〇</li>
    <li>ブザー：監査席</li>
    <li>ドアカット：×</li>
    <li>運転士交代：×</li>
  </ul>
</div>

<!-- ▼ 1001F（赤） -->
<div class="section-title">1001F（RODABAJA）</div>
<div class="train">
  <div class="car red">
    <div class="car-top"></div>
    <div class="car-body">
      <div class="car-type">Tc</div>
      <div class="car-number">1001</div>
    </div>
  </div>
</div>

<!-- ▼ 1051F（黒） -->
<div class="section-title">1051F（通常）</div>
<div class="train">
  <div class="car black">
    <div class="car-top"></div>
    <div class="car-body">
      <div class="car-type">Tc</div>
      <div class="car-number">1051</div>
    </div>
  </div>
</div>

<!-- ▼ 全編成ボタン -->
<div id="show-all-btn" class="show-all-btn">▼ 全編成を表示</div>

<!-- ▼ 折りたたみ領域 -->
<div id="train-list" class="train-list-collapsible"></div>

<script>
const list = document.getElementById("train-list");

// ▼ 1002〜1050（赤）
for (let i = 1002; i <= 1050; i++) {
  list.insertAdjacentHTML("beforeend", `
    <div class="section-title">${i}F（RODABAJA）</div>
    <div class="train">
      <div class="car red">
        <div class="car-top"></div>
        <div class="car-body">
          <div class="car-type">Tc</div>
          <div class="car-number">${i}</div>
        </div>
      </div>
    </div>
  `);
}

// ▼ 1052〜1100（黒）※上限は仮
for (let i = 1052; i <= 1100; i++) {
  list.insertAdjacentHTML("beforeend", `
    <div class="section-title">${i}F（通常）</div>
    <div class="train">
      <div class="car black">
        <div class="car-top"></div>
        <div class="car-body">
          <div class="car-type">Tc</div>
          <div class="car-number">${i}</div>
        </div>
      </div>
    </div>
  `);
}

// ▼ ボタンで開閉
const btn = document.getElementById("show-all-btn");
btn.addEventListener("click", () => {
  list.classList.toggle("open");
  btn.textContent = list.classList.contains("open")
    ? "▲ 全編成を隠す"
    : "▼ 全編成を表示";
});
</script>

</body>
</html>
